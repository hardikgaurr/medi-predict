<!DOCTYPE html>
<html>
<head>
    <title>MediPredict</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
            font-weight: 600;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 420px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input, select {
            padding: 10px;
            width: 90%;
            margin: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5548d9;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f3f6;
            margin: 5px auto;
            padding: 8px;
            width: 80%;
            border-radius: 5px;
        }

        .report {
            margin-top: 20px;
            padding: 20px;
            background: #fdfdfd;
            border-radius: 10px;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.08);
        }

        .top-item {
            background: #eef2ff;
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            background: #6c63ff;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 6px;
        }

        .disclaimer {
            color: red;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>MediPredict 🧠</h1>

<div class="container">

    <!-- Patient Info -->
    <input id="name" placeholder="Full Name">
    <input id="age" type="number" placeholder="Age">

    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <!-- Symptoms -->
    <input list="symptomsList" id="symptom" placeholder="Select symptom">
    <datalist id="symptomsList"></datalist>

    <button onclick="addSymptom()">Add Symptom</button>

    <ul id="list"></ul>

    <button onclick="predict()">Generate Report</button>

    <!-- Report -->
    <div class="report" id="report" style="display:none;">
        <h2>🧾 Medical Report</h2>

        <p id="patient"></p>
        <p id="prediction"></p>

        <div id="top3"></div>

        <div class="disclaimer">
            ⚠️ This is not a medical diagnosis. Consult a doctor.
        </div>
    </div>

</div>

<script>
let symptoms = [];

// Load symptoms
fetch("http://127.0.0.1:5000/symptoms")
.then(res => res.json())
.then(data => {
    let list = document.getElementById("symptomsList");
    data.forEach(symptom => {
        let option = document.createElement("option");
        option.value = symptom.replaceAll("_", " ");
        list.appendChild(option);
    });
});

function addSymptom() {
    let input = document.getElementById("symptom");
    let value = input.value.trim();

    if (value === "") return;

    symptoms.push(value);

    let li = document.createElement("li");
    li.innerText = value;
    document.getElementById("list").appendChild(li);

    input.value = "";
}

function predict() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let gender = document.getElementById("gender").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ symptoms: symptoms })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("report").style.display = "block";

        document.getElementById("patient").innerText =
            `👤 ${name} | 🎂 ${age} | ⚧ ${gender}`;

        document.getElementById("prediction").innerHTML =
            `<b>Prediction:</b> ${data.prediction}`;

        let html = "<h4>Top Predictions:</h4>";

        data.top3.forEach(item => {
            html += `
                <div class="top-item">
                    ${item.disease}
                    <span class="badge">${(item.probability * 100).toFixed(1)}%</span>
                </div>
            `;
        });

        document.getElementById("top3").innerHTML = html;
    });
}
</script>

</body>
</html>
